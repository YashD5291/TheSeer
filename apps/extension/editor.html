<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Seer — Resume Editor</title>
  <link rel="stylesheet" href="dist/tailwind.css">
  <style>
    body { margin: 0; overflow: hidden; }

    /* Split-pane transitions */
    #pdf-pane {
      width: 100%;
      transition: width 300ms cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 0;
    }
    #pdf-pane.split { width: 50%; }

    #code-pane {
      width: 0;
      overflow: hidden;
      transition: width 300ms cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 0;
    }
    #code-pane.visible { width: 50%; }

    /* PDF embed fills its pane */
    #pdf-embed {
      width: 100%;
      height: 100%;
      border: none;
      background: #1a1a1a;
    }

    /* CodeMirror container fills code pane */
    #codemirror-container {
      height: 100%;
      overflow: hidden;
    }
    #codemirror-container .cm-editor {
      height: 100%;
    }

    /* Status bar states */
    .status-idle   { color: #a1a1aa; }
    .status-compiling { color: #fbbf24; }
    .status-success { color: #34d399; }
    .status-error  { color: #f87171; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #fbbf24;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* Confirmation modal */
    #confirm-modal {
      backdrop-filter: blur(4px);
    }

    /* Error details toggle */
    #error-details {
      max-height: 120px;
      overflow-y: auto;
      font-size: 11px;
      line-height: 1.4;
    }

    /* Header button base */
    .header-btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 150ms, opacity 150ms;
    }
    .header-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Toggle switch for auto-compile */
    .toggle-track {
      width: 36px; height: 20px;
      border-radius: 10px;
      background: #3f3f46;
      position: relative;
      cursor: pointer;
      transition: background 200ms;
    }
    .toggle-track.active { background: #059669; }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #fff;
      transition: transform 200ms;
    }
    .toggle-track.active::after { transform: translateX(16px); }
  </style>
</head>
<body class="bg-zinc-900 text-zinc-100 antialiased h-screen flex flex-col">

  <!-- Header -->
  <header id="editor-header" class="flex items-center justify-between px-4 h-12 bg-zinc-800 border-b border-zinc-700 shrink-0">
    <div class="flex items-center gap-3">
      <img src="icons/icon48.png" alt="Seer" class="w-6 h-6">
      <span id="header-title" class="text-sm font-medium text-zinc-200">Resume Editor</span>
    </div>
    <div class="flex items-center gap-2">
      <!-- Preview mode buttons -->
      <div id="preview-buttons" class="flex items-center gap-2">
        <button id="btn-edit" class="header-btn bg-zinc-700 text-zinc-200 hover:bg-zinc-600" title="Edit LaTeX">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
        </button>
        <button id="btn-download" class="header-btn bg-zinc-700 text-zinc-200 hover:bg-zinc-600" title="Download PDF">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        </button>
      </div>
      <!-- Edit mode buttons (hidden by default) -->
      <div id="edit-buttons" class="hidden flex items-center gap-2">
        <button id="btn-recompile" class="header-btn bg-amber-600 text-white hover:bg-amber-500">Recompile</button>
        <button id="btn-save" class="header-btn bg-emerald-600 text-white hover:bg-emerald-500">Save</button>
        <button id="btn-close-editor" class="header-btn bg-zinc-700 text-zinc-200 hover:bg-zinc-600" title="Close editor">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <div id="editor-root" class="flex flex-1 min-h-0">
    <!-- Code pane (hidden by default, appears on left) -->
    <div id="code-pane" class="border-r border-zinc-700 bg-zinc-900">
      <div id="codemirror-container"></div>
    </div>
    <!-- PDF pane (always visible) -->
    <div id="pdf-pane" class="bg-zinc-950 flex items-center justify-center">
      <embed id="pdf-embed" type="application/pdf">
      <div id="pdf-loading" class="text-zinc-500 text-sm">Loading PDF...</div>
    </div>
  </div>

  <!-- Status bar (visible in edit mode) -->
  <div id="status-bar" class="hidden items-center justify-between px-4 h-8 bg-zinc-800 border-t border-zinc-700 shrink-0 text-xs">
    <div class="flex items-center gap-3">
      <span id="status-text" class="status-idle">Ready</span>
      <span id="status-time" class="text-zinc-500"></span>
    </div>
    <div class="flex items-center gap-3">
      <span id="dirty-indicator" class="text-amber-400 hidden">Unsaved changes</span>
      <div class="flex items-center gap-2">
        <span class="text-zinc-400">Auto-compile</span>
        <div id="auto-toggle" class="toggle-track" title="Toggle auto-compile on idle"></div>
      </div>
    </div>
  </div>

  <!-- Error details bar (hidden) -->
  <div id="error-bar" class="hidden px-4 py-2 bg-red-950 border-t border-red-800 shrink-0">
    <div class="flex items-center justify-between">
      <span class="text-red-400 text-xs font-medium">Compilation Error</span>
      <button id="error-dismiss" class="text-red-400 hover:text-red-300 text-xs cursor-pointer">Dismiss</button>
    </div>
    <pre id="error-details" class="text-red-300 mt-1 whitespace-pre-wrap font-mono"></pre>
  </div>

  <!-- Confirmation modal -->
  <div id="confirm-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-zinc-800 rounded-lg border border-zinc-700 p-6 max-w-sm w-full mx-4 shadow-xl">
      <h3 class="text-sm font-medium text-zinc-100 mb-2">Unsaved changes</h3>
      <p class="text-xs text-zinc-400 mb-5">You have edits that haven't been compiled and saved. Discard them?</p>
      <div class="flex justify-end gap-2">
        <button id="modal-cancel" class="header-btn bg-zinc-700 text-zinc-200 hover:bg-zinc-600">Keep editing</button>
        <button id="modal-discard" class="header-btn bg-red-600 text-white hover:bg-red-500">Discard</button>
      </div>
    </div>
  </div>

  <script type="module" src="dist/editor.js"></script>
</body>
</html>
